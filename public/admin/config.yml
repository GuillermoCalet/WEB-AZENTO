backend:
  name: github
  repo: GuillermoCalet/WEB-AZENTO
  branch: main
  base_url: https://cms-auth.azentohome.com
  auth_endpoint: /auth
  auth_scope: repo
  squash_merges: true
  open_authoring: true
publish_mode: editorial_workflow
show_preview_links: true
local_backend: true
locale: es
site_url: https://azentohome.com
display_url: https://azentohome.com
logo_url: https://azentohome.com/images/logo_azento.jpg

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: general
    label: Contenido general
    label_singular: Apartado general
    description: "Datos comunes a las dos divisiones: empresa, contacto, portada general y SEO."
    editor:
      preview: false
    files:
      - name: configuracion
        label: Empresa, contacto y SEO
        file: src/content/cms/site-settings.json
        format: json
        description: Datos de empresa, contacto, logotipos y SEO general.
        preview_path: /
        fields:
          - { label: Nombre de la marca, name: companyName, widget: string }
          - { label: Razón social, name: legalName, widget: string, hint: Debe coincidir con la documentación legal. }
          - { label: URL de la web, name: siteUrl, widget: string, pattern: ["^https://[^ ]+$", "Debe empezar por https://"] }
          - label: Logo
            name: logo
            widget: object
            fields:
              - { label: Imagen, name: src, widget: image, choose_url: false }
              - { label: Texto alternativo, name: alt, widget: string, hint: Obligatorio para accesibilidad. }
              - { label: Pie de foto, name: caption, widget: hidden, required: false, default: "" }
          - label: Logo claro decorativo
            name: lightLogo
            widget: object
            fields:
              - { label: Imagen, name: src, widget: image, choose_url: false }
              - { label: Texto alternativo, name: alt, widget: hidden, required: false, default: "" }
              - { label: Pie de foto, name: caption, widget: hidden, required: false, default: "" }
          - { label: Teléfono visible, name: phoneDisplay, widget: string, hint: Ejemplo 919 898 717. }
          - { label: Enlace de teléfono, name: phoneHref, widget: string, pattern: ["^tel:\\+[0-9]+$", "Formato tel:+34919898717"] }
          - { label: Email, name: email, widget: string, pattern: ["^[^@ ]+@[^@ ]+\\.[^@ ]+$", "Introduce un email válido."] }
          - { label: Zona de trabajo, name: location, widget: string }
          - { label: Dirección legal, name: address, widget: string }
          - { label: WhatsApp, name: whatsapp, widget: string, required: false }
          - label: Instagram
            name: instagram
            widget: object
            fields:
              - { label: Nombre visible, name: label, widget: string }
              - { label: URL, name: url, widget: string, pattern: ["^https://", "Debe ser una URL https://"] }
          - { label: Horario, name: hours, widget: string, required: false }
          - { label: Texto del pie de página, name: footerTagline, widget: text }
          - label: Datos legales
            name: legal
            widget: object
            hint: Revisa estos datos con asesoría legal antes de publicarlos.
            fields:
              - { label: CIF, name: cif, widget: string }
              - { label: Registro mercantil, name: registry, widget: text }
          - label: SEO general
            name: defaultSeo
            widget: object
            fields:
              - { label: Título, name: title, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
              - { label: Descripción, name: description, widget: text }
              - { label: Imagen social, name: image, widget: image, choose_url: false }
              - { label: Texto alternativo de imagen social, name: imageAlt, widget: string }

      - name: textos_globales
        label: Textos globales de la web
        file: src/content/cms/site-copy.json
        format: json
        description: Etiquetas, botones, formulario, cookies, footer y textos de interfaz compartidos por toda la web.
        fields:
          - label: Navegación
            name: navigation
            widget: object
            fields:
              - { label: Enlace a servicios, name: servicesLabel, widget: string }
              - { label: Enlace a proyectos, name: projectsLabel, widget: string }
              - { label: Enlace a proceso, name: processLabel, widget: string }
              - { label: Enlace a contacto, name: contactLabel, widget: string }
              - { label: Botón volver a la página principal, name: backHomeLabel, widget: string }
              - { label: Botón pedir presupuesto, name: quoteLabel, widget: string }
              - { label: Accesibilidad abrir menú, name: openMenuLabel, widget: string }
              - { label: Accesibilidad cerrar menú, name: closeMenuLabel, widget: string }
          - label: Portada
            name: home
            widget: object
            fields:
              - { label: Accesibilidad logo, name: logoAriaSuffix, widget: string }
              - { label: Prefijo para tarjetas, name: discoverAriaPrefix, widget: string }
              - { label: Contacto teléfono, name: contactPhoneLabel, widget: string }
              - { label: Contacto email, name: contactEmailLabel, widget: string }
              - { label: Contacto Instagram, name: contactInstagramLabel, widget: string }
              - { label: Contacto ubicación, name: contactLocationLabel, widget: string }
              - { label: Accesibilidad enlaces legales, name: legalNavLabel, widget: string }
          - label: Páginas de división
            name: businessPage
            widget: object
            fields:
              - { label: Botón hero presupuesto, name: heroQuoteLabel, widget: string }
              - { label: Botón hero proyectos, name: heroProjectsLabel, widget: string }
              - { label: Mensaje sin servicios, name: servicesEmptyText, widget: text }
              - { label: Mensaje sin proyectos, name: projectsEmptyText, widget: text }
              - { label: Accesibilidad tarjeta servicio, name: serviceMoreInfoAriaPrefix, widget: string }
              - { label: Accesibilidad abrir imagen, name: galleryOpenImageAriaPrefix, widget: string }
              - { label: Accesibilidad cerrar imagen, name: galleryCloseImageAriaLabel, widget: string }
              - { label: Accesibilidad imagen anterior, name: galleryPreviousImageAriaLabel, widget: string }
              - { label: Accesibilidad imagen siguiente, name: galleryNextImageAriaLabel, widget: string }
              - { label: Etiqueta proceso, name: processEyebrow, widget: string }
              - { label: Etiqueta CTA inferior, name: ctaEyebrow, widget: string }
              - { label: Título CTA inferior, name: ctaTitle, widget: string }
          - label: Formulario y contacto
            name: contact
            widget: object
            fields:
              - { label: Tarjeta teléfono, name: phoneLabel, widget: string }
              - { label: Tarjeta correo, name: emailLabel, widget: string }
              - { label: Tarjeta Instagram, name: instagramLabel, widget: string }
              - { label: Tarjeta ubicación, name: locationLabel, widget: string }
              - { label: Título formulario, name: formTitle, widget: string }
              - { label: Aviso campos obligatorios, name: requiredHint, widget: string }
              - { label: Campo antispam oculto, name: honeypotLabel, widget: string }
              - { label: Etiqueta nombre, name: nameLabel, widget: string }
              - { label: Placeholder nombre, name: namePlaceholder, widget: string }
              - { label: Etiqueta email, name: emailLabelField, widget: string }
              - { label: Placeholder email, name: emailPlaceholder, widget: string }
              - { label: Etiqueta teléfono, name: phoneLabelField, widget: string }
              - { label: Placeholder teléfono, name: phonePlaceholder, widget: string }
              - { label: Etiqueta servicio, name: serviceLabel, widget: string }
              - { label: Placeholder servicio, name: servicePlaceholder, widget: string }
              - { label: Etiqueta mensaje, name: messageLabel, widget: string }
              - { label: Placeholder mensaje, name: messagePlaceholder, widget: text }
              - { label: Texto antes del enlace de privacidad, name: privacyPrefix, widget: string }
              - { label: Texto del enlace de privacidad, name: privacyLinkLabel, widget: string }
              - { label: Texto después del enlace de privacidad, name: privacySuffix, widget: text }
              - { label: Botón enviar, name: submitLabel, widget: string }
              - { label: Botón enviando, name: submittingLabel, widget: string }
              - { label: Título éxito, name: successTitle, widget: string }
              - { label: Mensaje éxito, name: successMessage, widget: text }
              - { label: Título error, name: errorTitle, widget: string }
              - { label: Error genérico, name: fallbackError, widget: text }
              - { label: Error PHP local, name: localPhpError, widget: text }
              - { label: Error formulario no disponible, name: unavailableError, widget: text }
          - label: Pie de página
            name: footer
            widget: object
            fields:
              - { label: Título enlaces de división, name: divisionHeading, widget: string }
              - { label: Título áreas, name: areasHeading, widget: string }
              - { label: Título legal, name: legalHeading, widget: string }
              - { label: Elegir área, name: chooseAreaLabel, widget: string }
              - { label: Privacidad, name: privacyLabel, widget: string }
              - { label: Aviso legal, name: legalNoticeLabel, widget: string }
              - { label: Política de cookies, name: cookiesLabel, widget: string }
              - { label: Configurar cookies, name: cookieSettingsLabel, widget: string }
              - { label: Derechos reservados, name: rightsLabel, widget: string }
              - { label: Volver arriba, name: backToTopLabel, widget: string }
              - { label: Accesibilidad Instagram, name: instagramAriaSuffix, widget: string }
              - { label: Accesibilidad selección de área, name: areaSelectionAriaSuffix, widget: string }
          - label: Banner de cookies
            name: cookies
            widget: object
            fields:
              - { label: Título banner, name: bannerTitle, widget: string }
              - { label: Descripción banner, name: bannerDescription, widget: text }
              - { label: Más información, name: moreInfoLabel, widget: string }
              - { label: Configurar, name: settingsLabel, widget: string }
              - { label: Rechazar, name: rejectLabel, widget: string }
              - { label: Aceptar todas, name: acceptAllLabel, widget: string }
              - { label: Título modal, name: modalTitle, widget: string }
              - { label: Cerrar modal, name: modalCloseLabel, widget: string }
              - { label: Cookies necesarias título, name: necessaryTitle, widget: string }
              - { label: Cookies necesarias descripción, name: necessaryDescription, widget: text }
              - { label: Cookies necesarias estado, name: necessaryBadge, widget: string }
              - { label: Cookies analíticas título, name: analyticsTitle, widget: string }
              - { label: Cookies analíticas descripción, name: analyticsDescription, widget: text }
              - { label: Guardar preferencias, name: savePreferencesLabel, widget: string }
          - label: Página de servicio
            name: serviceDetail
            widget: object
            fields:
              - { label: Breadcrumb inicio, name: homeBreadcrumbLabel, widget: string }
              - { label: Breadcrumb servicios, name: servicesBreadcrumbLabel, widget: string }
              - { label: Texto superior hero, name: heroEyebrow, widget: string }
              - { label: Título incluidos, name: includedTitle, widget: string }
              - { label: Título interés, name: interestTitle, widget: string }
              - { label: Descripción interés, name: interestDescription, widget: text }
              - { label: Contacto directo, name: directContactTitle, widget: string }
              - { label: Etiqueta galería, name: galleryEyebrow, widget: string }
              - { label: Título galería, name: galleryTitle, widget: string }
              - { label: Etiqueta FAQ, name: faqEyebrow, widget: string }
              - { label: Título FAQ, name: faqTitle, widget: string }
              - { label: Volver a servicios, name: backToServicesLabel, widget: string }
              - { label: Botón presupuesto, name: quoteLabel, widget: string }
          - label: Textos legales comunes
            name: legal
            widget: object
            fields:
              - { label: Prefijo actualización, name: updatedPrefix, widget: string }
              - { label: Volver al inicio, name: backHomeLabel, widget: string }
              - { label: Etiqueta email, name: contactEmailLabel, widget: string }
              - { label: Etiqueta teléfono, name: contactPhoneLabel, widget: string }
              - { label: Botón configurar cookies, name: cookieConfigButtonLabel, widget: string }

      - name: textos_legales
        label: Páginas legales
        file: src/content/cms/legal-pages.json
        format: json
        description: Textos completos de aviso legal, privacidad y cookies. Puedes usar variables como {{legalName}}, {{email}}, {{phone}}, {{siteUrl}}.
        fields:
          - label: Aviso legal
            name: legalNotice
            widget: object
            fields:
              - { label: Título SEO, name: seoTitle, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
              - { label: Descripción SEO, name: seoDescription, widget: text }
              - { label: Título de página, name: title, widget: string }
              - { label: Fecha visible, name: updatedDate, widget: string }
              - label: Secciones
                name: sections
                widget: list
                summary: "{{fields.heading}}"
                fields:
                  - { label: Título, name: heading, widget: string }
                  - { label: Nivel, name: level, widget: select, options: ["h2", "h3"], default: "h2" }
                  - label: Párrafos
                    name: paragraphs
                    widget: list
                    required: false
                    field: { label: Párrafo, name: paragraph, widget: text }
                  - label: Lista
                    name: list
                    widget: list
                    required: false
                    fields:
                      - { label: Etiqueta en negrita, name: label, widget: string, required: false }
                      - { label: Texto, name: text, widget: text }
                      - { label: Enlace, name: href, widget: string, required: false }
          - label: Política de privacidad
            name: privacyPolicy
            widget: object
            fields:
              - { label: Título SEO, name: seoTitle, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
              - { label: Descripción SEO, name: seoDescription, widget: text }
              - { label: Título de página, name: title, widget: string }
              - { label: Fecha visible, name: updatedDate, widget: string }
              - label: Secciones
                name: sections
                widget: list
                summary: "{{fields.heading}}"
                fields:
                  - { label: Título, name: heading, widget: string }
                  - { label: Nivel, name: level, widget: select, options: ["h2", "h3"], default: "h2" }
                  - label: Párrafos
                    name: paragraphs
                    widget: list
                    required: false
                    field: { label: Párrafo, name: paragraph, widget: text }
                  - label: Lista
                    name: list
                    widget: list
                    required: false
                    fields:
                      - { label: Etiqueta en negrita, name: label, widget: string, required: false }
                      - { label: Texto, name: text, widget: text }
                      - { label: Enlace, name: href, widget: string, required: false }
          - label: Política de cookies
            name: cookiePolicy
            widget: object
            fields:
              - { label: Título SEO, name: seoTitle, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
              - { label: Descripción SEO, name: seoDescription, widget: text }
              - { label: Título de página, name: title, widget: string }
              - { label: Fecha visible, name: updatedDate, widget: string }
              - { label: Botón de configuración, name: actionButtonLabel, widget: string, required: false }
              - label: Secciones
                name: sections
                widget: list
                summary: "{{fields.heading}}"
                fields:
                  - { label: Título, name: heading, widget: string }
                  - { label: Nivel, name: level, widget: select, options: ["h2", "h3"], default: "h2" }
                  - label: Párrafos
                    name: paragraphs
                    widget: list
                    required: false
                    field: { label: Párrafo, name: paragraph, widget: text }
                  - label: Lista
                    name: list
                    widget: list
                    required: false
                    fields:
                      - { label: Etiqueta en negrita, name: label, widget: string, required: false }
                      - { label: Texto, name: text, widget: text }
                      - { label: Enlace, name: href, widget: string, required: false }

      - name: inicio
        label: Página de inicio
        file: src/content/cms/home.json
        format: json
        preview_path: /
        fields:
          - { label: Estado de la portada, name: published, widget: hidden, default: true }
          - { label: Título SEO, name: seoTitle, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
          - { label: Descripción SEO, name: seoDescription, widget: text }
          - { label: Imagen social, name: seoImage, widget: image, choose_url: false }
          - { label: Texto superior, name: eyebrow, widget: string }
          - { label: Título principal, name: title, widget: string }
          - { label: Texto introductorio, name: intro, widget: text }
          - { label: Etiqueta de tarjetas, name: cardEyebrow, widget: string }
          - { label: Texto del botón de tarjetas, name: cardCtaPrefix, widget: string }
          - { label: Etiqueta de contacto, name: contactEyebrow, widget: string }
          - { label: Título de contacto, name: contactTitle, widget: string }

  - name: madera
    label: Madera tecnológica
    label_singular: Contenido de Madera tecnológica
    description: Todo el contenido de madera tecnológica, organizado dentro de un único apartado.
    editor:
      preview: false
    files:
      - name: pagina_madera
        label: Página, proyectos y servicios
        file: src/content/cms/madera-tecnologica.json
        format: json
        description: Textos, imágenes, servicios, proyectos, proceso y formulario de esta división.
        preview_path: /madera-tecnologica
        fields:
          - { label: Nombre, name: name, widget: string }
          - { label: Nombre corto, name: shortName, widget: string }
          - { label: Descripción de la tarjeta de inicio, name: selectorDescription, widget: text }
          - { label: Imagen de la tarjeta de inicio, name: selectorImage, widget: image, choose_url: false }
          - { label: Texto alternativo de la tarjeta, name: selectorAlt, widget: string }
          - { label: Texto superior del hero, name: heroEyebrow, widget: string }
          - { label: Título principal, name: heroTitle, widget: string }
          - { label: Descripción principal, name: heroDescription, widget: text }
          - { label: Imagen principal, name: heroImage, widget: image, choose_url: false }
          - { label: Texto alternativo de imagen principal, name: heroAlt, widget: string }
          - { label: Título SEO, name: seoTitle, widget: string }
          - { label: Descripción SEO, name: seoDescription, widget: text }
          - { label: Título de servicios, name: servicesTitle, widget: string }
          - { label: Introducción de servicios, name: servicesDescription, widget: text }
          - label: Servicios
            name: services
            widget: list
            max: 20
            collapsed: true
            summary: "{{fields.title}}"
            hint: Puedes añadir, ocultar, eliminar o reordenar. La apariencia no es editable.
            fields:
              - { label: Nombre, name: title, widget: string }
              - { label: Identificador de URL, name: slug, widget: string, required: false, hint: Se genera automáticamente si queda vacío. }
              - { label: Descripción, name: description, widget: text }
              - { label: Enlace a página detallada, name: href, widget: string, required: false, hint: Déjalo vacío si no existe una página detallada. }
              - { label: Visible, name: visible, widget: boolean, default: true }
          - { label: Título de proyectos, name: projectsTitle, widget: string }
          - { label: Introducción de proyectos, name: projectsDescription, widget: text }
          - label: Proyectos
            name: projects
            widget: list
            max: 20
            collapsed: true
            summary: "{{fields.title}}"
            hint: Arrastra para cambiar el orden. El primer proyecto ocupa el bloque grande.
            fields:
              - { label: Título, name: title, widget: string }
              - { label: Identificador, name: slug, widget: string, required: false, hint: Se genera automáticamente si queda vacío. }
              - { label: Tipo de proyecto, name: category, widget: string }
              - { label: Imagen principal, name: image, widget: image, choose_url: false }
              - { label: Texto alternativo, name: alt, widget: string, hint: Describe la imagen para una persona que no puede verla. }
              - { label: Pie de foto, name: caption, widget: string, required: false }
              - { label: Encuadre, name: objectPosition, widget: select, options: ["center", "center 40%", "center 42%", "center top", "center bottom"], default: center }
              - { label: Visible, name: visible, widget: boolean, default: true }
              - { label: Destacado, name: featured, widget: boolean, default: false }
          - { label: Título del proceso, name: processTitle, widget: string }
          - { label: Introducción del proceso, name: processDescription, widget: text }
          - label: Pasos del proceso
            name: process
            widget: list
            min: 1
            max: 6
            summary: "{{fields.title}}"
            fields:
              - { label: Título, name: title, widget: string }
              - { label: Descripción, name: description, widget: text }
          - { label: Título de confianza, name: trustTitle, widget: string }
          - label: Motivos de confianza
            name: trust
            widget: list
            min: 1
            max: 6
            summary: "{{fields.title}}"
            fields:
              - { label: Título, name: title, widget: string }
              - { label: Descripción, name: description, widget: text }
          - { label: Título del formulario, name: formTitle, widget: string }
          - { label: Introducción del formulario, name: formDescription, widget: text }
          - label: Opciones del formulario
            name: formServices
            widget: list
            min: 1
            max: 20
            summary: "{{fields.label}}"
            fields:
              - { label: Valor interno, name: value, widget: string, hint: Minúsculas y guiones; no cambiar si ya está en uso. }
              - { label: Nombre visible, name: label, widget: string }

      - name: servicios_madera
        label: Páginas detalladas y galerías
        file: src/content/cms/servicios-madera.json
        format: json
        description: Páginas bajo /servicios/ que pertenecen exclusivamente a esta división.
        preview_path: /servicios/
        fields:
          - label: Servicios detallados
            name: services
            widget: list
            max: 30
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: Nombre, name: title, widget: string }
              - { label: Slug, name: slug, widget: string, required: false, hint: Se genera automáticamente si queda vacío. Cambiarlo modifica la URL. }
              - { label: Publicado, name: published, widget: boolean, default: true }
              - { label: Icono, name: icon, widget: select, options: [{ label: Jardín, value: garden }, { label: Pérgola, value: pergola }, { label: Fachada, value: facade }, { label: Interior, value: interior }] }
              - { label: Descripción corta, name: shortDescription, widget: text }
              - label: Párrafos descriptivos
                name: longDescription
                widget: list
                min: 1
                max: 12
                field: { label: Párrafo, name: paragraph, widget: text }
              - label: Características
                name: features
                widget: list
                max: 12
                field: { label: Característica, name: feature, widget: string }
              - label: Elementos incluidos
                name: bullets
                widget: list
                max: 20
                field: { label: Elemento, name: bullet, widget: string }
              - label: Galería
                name: gallery
                widget: list
                max: 20
                collapsed: true
                summary: "{{fields.alt}}"
                fields:
                  - { label: Imagen, name: src, widget: image, choose_url: false }
                  - { label: Texto alternativo, name: alt, widget: string }
                  - { label: Pie de foto, name: caption, widget: string, required: false }
              - label: Llamadas a la acción
                name: cta
                widget: object
                fields:
                  - { label: Texto principal, name: primaryText, widget: string }
                  - { label: Enlace principal, name: primaryHref, widget: string }
                  - { label: Texto secundario, name: secondaryText, widget: string }
                  - { label: Enlace secundario, name: secondaryHref, widget: string }
              - label: Preguntas frecuentes
                name: faq
                widget: list
                max: 20
                collapsed: true
                summary: "{{fields.question}}"
                fields:
                  - { label: Pregunta, name: question, widget: string }
                  - { label: Respuesta, name: answer, widget: text }
                  - { label: Visible, name: visible, widget: boolean, default: true }
              - label: SEO
                name: seo
                widget: object
                fields:
                  - { label: Título, name: title, widget: string, pattern: [".{1,70}", "Máximo 70 caracteres."] }
                  - { label: Descripción, name: description, widget: text }

  - name: reformas
    label: Reformas
    label_singular: Contenido de Reformas
    description: Todo el contenido de reformas, organizado dentro de un único apartado.
    editor:
      preview: false
    files:
      - name: pagina_reformas
        label: Página, proyectos y servicios
        file: src/content/cms/reformas.json
        format: json
        description: Textos, imágenes, servicios, proyectos, proceso y formulario de esta división.
        preview_path: /reformas
        fields:
          - { label: Nombre, name: name, widget: string }
          - { label: Nombre corto, name: shortName, widget: string }
          - { label: Descripción de la tarjeta de inicio, name: selectorDescription, widget: text }
          - { label: Imagen de la tarjeta de inicio, name: selectorImage, widget: image, choose_url: false }
          - { label: Texto alternativo de la tarjeta, name: selectorAlt, widget: string }
          - { label: Texto superior del hero, name: heroEyebrow, widget: string }
          - { label: Título principal, name: heroTitle, widget: string }
          - { label: Descripción principal, name: heroDescription, widget: text }
          - { label: Imagen principal, name: heroImage, widget: image, choose_url: false }
          - { label: Texto alternativo de imagen principal, name: heroAlt, widget: string }
          - { label: Título SEO, name: seoTitle, widget: string }
          - { label: Descripción SEO, name: seoDescription, widget: text }
          - { label: Título de servicios, name: servicesTitle, widget: string }
          - { label: Introducción de servicios, name: servicesDescription, widget: text }
          - label: Servicios
            name: services
            widget: list
            max: 20
            collapsed: true
            summary: "{{fields.title}}"
            hint: Puedes añadir, ocultar, eliminar o reordenar. La apariencia no es editable.
            fields:
              - { label: Nombre, name: title, widget: string }
              - { label: Identificador de URL, name: slug, widget: string, required: false, hint: Se genera automáticamente si queda vacío. }
              - { label: Descripción, name: description, widget: text }
              - { label: Enlace a página detallada, name: href, widget: string, required: false, hint: Déjalo vacío si no existe una página detallada. }
              - { label: Visible, name: visible, widget: boolean, default: true }
          - { label: Título de proyectos, name: projectsTitle, widget: string }
          - { label: Introducción de proyectos, name: projectsDescription, widget: text }
          - label: Proyectos
            name: projects
            widget: list
            max: 20
            collapsed: true
            summary: "{{fields.title}}"
            hint: Arrastra para cambiar el orden. El primer proyecto ocupa el bloque grande.
            fields:
              - { label: Título, name: title, widget: string }
              - { label: Identificador, name: slug, widget: string, required: false, hint: Se genera automáticamente si queda vacío. }
